<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modular Arithmetic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 1rem 0.6rem;
      gap: 0.4rem;
    }

    /* ── Topbar ──────────────────────────────────────────────────── */
    .topbar {
      flex-shrink: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 0.5rem;
      position: relative;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
    }
    .topbar h1 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
      pointer-events: none;
      white-space: nowrap;
    }
    .topbar-btn {
      background: none;
      border: 1px solid #a78bfa;
      border-radius: 4px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 1;
      flex-shrink: 0;
    }
    .topbar-btn:hover { background: #1e1530; }
    .topbar-btn:active { background: #2a1f4a; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 1;
      flex-shrink: 0;
    }
    .topbar-text-btn {
      display: none;
      background: none;
      border: 1px solid #a78bfa;
      border-radius: 4px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 0 0.65rem;
      height: 36px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .topbar-text-btn:hover { background: #1e1530; }
    .topbar-text-btn:active { background: #2a1f4a; }
    @media (min-width: 541px) {
      .topbar-text-btn { display: flex; align-items: center; }
    }

    #canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #c { display: block; border-radius: 50%; }

    .controls {
      flex-shrink: 0;
      width: 100%;
      max-width: 720px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    /* columns: [dec] [inc] [row-play] [step] [label] [lo] [slider] [hi] [value] */
    .row {
      display: grid;
      grid-template-columns: 20px 20px 26px 46px 58px 34px 1fr 34px 56px;
      align-items: center;
      gap: 0.3rem;
    }

    .lbl {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      white-space: nowrap;
      text-align: right;
      padding-right: 2px;
    }

    /* ── shared number input base ── */
    input[type="number"] {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 5px;
      color: #a78bfa;
      font-size: 0.85rem;
      font-weight: 700;
      text-align: center;
      padding: 3px 2px;
      width: 100%;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { outline: none; border-color: #a78bfa; }

    /* bound inputs flanking the slider — subtle, tooltip cursor */
    .bound {
      color: #555;
      font-size: 0.72rem;
      font-weight: 400;
      border-color: #222;
      cursor: help;
      text-align: center;
    }
    .bound:hover { border-color: #444; color: #888; }
    .bound:focus { outline: none; border-color: #555; color: #aaa; }

    /* step input */
    .step {
      color: #777;
      font-size: 0.72rem;
      font-weight: 400;
      border-color: #222;
    }
    .step:focus { outline: none; border-color: #666; }

    /* range slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: #333;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
      border: none;
    }

    /* step buttons (dec / inc) */
    .step-btn {
      background: none;
      border: 1px solid #a78bfa;
      border-radius: 4px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1;
      padding: 3px 2px;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .step-btn:hover { background: #1e1530; }
    .step-btn:active { background: #2a1f4a; }

    /* play toggle buttons */
    .row-play {
      background: none;
      border: 1px solid #a78bfa;
      border-radius: 4px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.6rem;
      line-height: 1;
      padding: 3px 2px;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .row-play:hover { background: #1e1530; }
    .row-play:active { background: #2a1f4a; }
    .row-play.active { background: #2a1f4a; border-color: #c4b5fd; color: #c4b5fd; }

    /* ── Portrait-mobile breakpoint ─────────────────────────────── */
    @media (max-width: 540px) {
      body {
        padding: 0.4rem 0.5rem 0.5rem;
        gap: 0.3rem;
      }

      /* Drop the slider and its bound inputs (controls panel only) */
      .controls .bound,
      .controls input[type="range"] { display: none; }

      /* 6-col grid: [−] [+] [▶] [step] [label] [value] */
      .row {
        grid-template-columns: 44px 44px 44px 56px 1fr 76px;
        align-items: center;
        gap: 0.4rem;
      }

      .controls {
        padding: 0.55rem 0.7rem;
        gap: 0.55rem;
      }

      /* Touch-friendly step buttons — explicit height, no more 100% */
      .step-btn {
        height: 44px;
        font-size: 1.2rem;
        border-radius: 6px;
        padding: 0;
      }

      /* Touch-friendly play button */
      .row-play {
        height: 44px;
        font-size: 0.8rem;
        border-radius: 6px;
        padding: 0;
      }

      /* Larger number inputs */
      input[type="number"] {
        font-size: 1rem;
        padding: 0 2px;
        height: 44px;
        border-radius: 7px;
      }

      /* Label adjustments */
      .lbl {
        font-size: 0.82rem;
        text-align: left;
        padding-right: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    }

    /* ── Focus tooltip ──────────────────────────────────────────── */
    #tip {
      position: fixed;
      background: #1e1530;
      color: #c4b5fd;
      border: 1px solid rgba(167,139,250,0.45);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.78rem;
      pointer-events: none;
      white-space: normal;
      text-align: center;
      max-width: 200px;
      line-height: 1.3;
      z-index: 9999;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
    }
    #tip.visible { opacity: 1; transform: translateY(0); }
    #tip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: var(--tip-arrow, 50%);
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: rgba(167,139,250,0.45);
    }
    #tip.tip-below::after {
      top: auto;
      bottom: 100%;
      border-top-color: transparent;
      border-bottom-color: rgba(167,139,250,0.45);
    }

    /* ── Settings overlay & panel ────────────────────────────────── */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
    }
    #settings-overlay.open { display: block; }
    /* Desktop: panel is a sidecar — no dim, no click-block */
    @media (min-width: 541px) {
      #settings-overlay.open { background: transparent; pointer-events: none; }
    }

    #settings-panel {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 300px;
      background: #141414;
      border-right: 1px solid #2a2a2a;
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    #settings-panel.open { transform: translateX(0); }

    @media (max-width: 540px) {
      #settings-panel { width: 100%; border-right: none; }
    }

    .sp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      height: 48px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .sp-header span { font-size: 0.9rem; font-weight: 600; color: #e0e0e0; letter-spacing: 0.04em; }
    .sp-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 8px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .sp-close:hover { color: #e0e0e0; background: #2a2a2a; }

    .sp-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .sp-section { display: flex; flex-direction: column; gap: 0.45rem; }
    .sp-section-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid #1e1e1e;
      margin-bottom: 0.15rem;
    }
    .sp-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 28px;
    }
    .sp-row label {
      font-size: 0.78rem;
      color: #999;
      flex-shrink: 0;
      width: 90px;
    }
    .sp-row input[type="color"] {
      width: 38px;
      height: 26px;
      border: 1px solid #333;
      border-radius: 5px;
      background: #0d0d0d;
      cursor: pointer;
      padding: 2px 3px;
      flex-shrink: 0;
    }
    .sp-row input[type="range"] {
      flex: 1;
      height: 4px;
      min-width: 0;
      width: auto;
    }
    .sp-row select {
      flex: 1;
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 5px;
      color: #a78bfa;
      font-size: 0.78rem;
      padding: 4px 6px;
      cursor: pointer;
    }
    .sp-row select:focus { outline: none; border-color: #a78bfa; }
    input[type="number"].sp-val {
      font-size: 0.74rem;
      font-weight: 400;
      color: #a78bfa;
      width: 44px;
      max-width: 44px;
      flex: 0 0 44px;
      text-align: right;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2e2e2e;
      border-radius: 0;
      padding: 1px 2px;
      cursor: text;
      -moz-appearance: textfield;
    }
    input[type="number"].sp-val::-webkit-inner-spin-button,
    input[type="number"].sp-val::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"].sp-val:focus { outline: none; border-bottom-color: #a78bfa; }
    .sp-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #a78bfa;
    }
    .sp-row.hidden { display: none; }

    /* ── Analysis modal ─────────────────────────────────────────── */
    #analysis-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #analysis-overlay.open { display: flex; }

    #analysis-modal {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      width: min(640px, 100%);
      max-height: calc(100vh - 2rem);
      display: flex;
      flex-direction: column;
      overflow: visible;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .am-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      height: 48px;
      border-bottom: 1px solid #2a2a2a;
      border-radius: 12px 12px 0 0;
      background: #141414;
      flex-shrink: 0;
    }
    .am-header span { font-size: 0.9rem; font-weight: 600; color: #e0e0e0; }
    .am-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 8px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .am-close:hover { color: #e0e0e0; background: #2a2a2a; }

    .am-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #141414;
    }
    .am-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem 1rem;
    }
    .am-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .am-field label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #777;
    }
    .am-field input[type="number"] {
      width: 100%;
      font-size: 0.85rem;
      padding: 6px 8px;
    }
    .am-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.25rem;
    }
    .am-run-btn {
      background: #2a1f4a;
      border: 1px solid #a78bfa;
      border-radius: 6px;
      color: #c4b5fd;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.45rem 1.1rem;
      transition: background 0.15s;
    }
    .am-run-btn:hover { background: #3b2d6a; }
    .am-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .am-status {
      font-size: 0.75rem;
      color: #888;
    }
    .am-results {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      overflow: visible;
    }
    .am-results.visible { display: flex; }
    .am-chart-wrap {
      position: relative;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      padding: 0.5rem;
      overflow: visible;
      border-radius: 0;
    }
    #analysis-chart {
      display: block;
      width: 100%;
      height: 340px;
      cursor: crosshair;
      border-radius: 0;
    }
    .am-chart-tip {
      position: absolute;
      display: none;
      background: #1e1530;
      border: 1px solid rgba(167,139,250,0.45);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.72rem;
      color: #c4b5fd;
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
      transform: translate(-50%, calc(-100% - 10px));
    }
    .am-chart-tip.visible { display: block; }
    .am-chart-hint {
      font-size: 0.68rem;
      color: #555;
      text-align: center;
      margin-top: -0.35rem;
    }
    .am-dl-btn {
      align-self: flex-start;
      background: none;
      border: 1px solid #555;
      border-radius: 5px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .am-dl-btn:hover { border-color: #a78bfa; color: #c4b5fd; }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="topbar-btn" id="settingsBtn" title="Settings">&#9881;</button>
    <h1>Modular Arithmetic</h1>
    <div class="topbar-right">
      <button class="topbar-text-btn" id="analysisBtn" title="Sweep multipliers and plot path length">Run Analysis</button>
      <button class="topbar-btn" id="downloadBtn" title="Download PNG">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- image frame -->
          <rect x="3" y="3" width="18" height="14" rx="2"/>
          <!-- mountain/landscape -->
          <polyline points="3,13 8,8 12,12 15,9 21,14"/>
          <!-- sun dot -->
          <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
          <!-- download arrow below -->
          <line x1="12" y1="19" x2="12" y2="23"/>
          <polyline points="9,21 12,24 15,21"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="controls">

    <!-- Multiplier row: [dec] [inc] [row-play] [step] [label] [lo] [slider] [hi] [value] -->
    <div class="row">
      <button class="step-btn" data-target="mult"   data-dir="-1" title="Decrement">&#8722;</button>
      <button class="step-btn" data-target="mult"   data-dir="1"  title="Increment">&#43;</button>
      <button class="row-play" id="multPlayBtn" title="Animate multiplier">&#9654;</button>
      <input class="step" id="multStep" type="number" value="1" step="any" title="Step size for arrows and animation speed (units/sec)" data-tip="Multiplier — step size and animation speed" />
      <span class="lbl">Mult</span>
      <input class="bound" id="multLo" type="number" value="1"   step="any" title="Lower bound of the Multiplier slider" data-tip="Multiplier — slider lower bound" />
      <input id="multSlider" type="range" min="1" max="200" value="2" step="0.1" />
      <input class="bound" id="multHi" type="number" value="200" step="any" title="Upper bound of the Multiplier slider" data-tip="Multiplier — slider upper bound" />
      <input id="multNum" type="number" value="2" step="0.01" data-tip="Multiplier — current value" />
    </div>

    <!-- Points row -->
    <div class="row">
      <button class="step-btn" data-target="points" data-dir="-1" title="Decrement">&#8722;</button>
      <button class="step-btn" data-target="points" data-dir="1"  title="Increment">&#43;</button>
      <button class="row-play" id="pointsPlayBtn" title="Animate points">&#9654;</button>
      <input class="step" id="pointsStep" type="number" value="5" step="any" title="Step size for arrows and animation speed (units/sec)" data-tip="Points — step size and animation speed" />
      <span class="lbl">Points</span>
      <input class="bound" id="pointsLo" type="number" value="0"   step="1" title="Lower bound of the Points slider" data-tip="Points — slider lower bound" />
      <input id="pointsSlider" type="range" min="0" max="200" value="200" step="5" />
      <input class="bound" id="pointsHi" type="number" value="200" step="1" title="Upper bound of the Points slider" data-tip="Points — slider upper bound" />
      <input id="pointsNum" type="number" value="200" step="1" data-tip="Points — current value" />
    </div>

  </div>

  <div id="tip" role="tooltip"></div>

  <!-- Settings panel -->
  <div id="settings-overlay"></div>
  <aside id="settings-panel" aria-label="Style settings">
    <div class="sp-header">
      <span>Style Settings</span>
      <button class="sp-close" id="settingsClose" title="Close">&#10005;</button>
    </div>
    <div class="sp-body">

      <div class="sp-section">
        <div class="sp-section-title">Behaviour</div>
        <div class="sp-row">
          <label for="s-snap-pause">Snap multi on pause</label>
          <input type="checkbox" id="s-snap-pause" />
        </div>
      </div>

      <div class="sp-section">
        <div class="sp-section-title">Background</div>
        <div class="sp-row">
          <label for="s-bg-color">Color</label>
          <input type="color" id="s-bg-color" value="#0d0d0d" />
        </div>
      </div>

      <div class="sp-section">
        <div class="sp-section-title">Circle Ring</div>
        <div class="sp-row">
          <label for="s-show-ring">Visible</label>
          <input type="checkbox" id="s-show-ring" checked />
        </div>
        <div class="sp-row">
          <label for="s-ring-color">Color</label>
          <input type="color" id="s-ring-color" value="#2a2a2a" />
        </div>
        <div class="sp-row">
          <label for="s-ring-width">Thickness</label>
          <input type="range" id="s-ring-width" min="0.5" max="8" step="0.5" value="1.5" />
          <input type="number" class="sp-val" id="s-ring-width-val" value="1.5" min="0.5" max="8" step="0.5" />
        </div>
      </div>

      <div class="sp-section">
        <div class="sp-section-title">Points</div>
        <div class="sp-row">
          <label for="s-show-dots">Visible</label>
          <input type="checkbox" id="s-show-dots" checked />
        </div>
        <div class="sp-row">
          <label for="s-dot-color">Color</label>
          <input type="color" id="s-dot-color" value="#3a3a5a" />
        </div>
        <div class="sp-row">
          <label for="s-dot-scale">Size</label>
          <input type="range" id="s-dot-scale" min="0.25" max="4" step="0.25" value="1" />
          <input type="number" class="sp-val" id="s-dot-scale-val" value="1" min="0.25" max="4" step="0.25" />
        </div>
      </div>

      <div class="sp-section">
        <div class="sp-section-title">Lines</div>
        <div class="sp-row">
          <label for="s-line-width">Thickness</label>
          <input type="range" id="s-line-width" min="0.1" max="5" step="0.1" value="1.2" />
          <input type="number" class="sp-val" id="s-line-width-val" value="1.2" min="0.1" max="5" step="0.1" />
        </div>
        <div class="sp-row">
          <label for="s-line-opacity">Opacity</label>
          <input type="range" id="s-line-opacity" min="0.02" max="1" step="0.01" value="0.55" />
          <input type="number" class="sp-val" id="s-line-opacity-val" value="0.55" min="0.02" max="1" step="0.01" />
        </div>
        <div class="sp-row">
          <label for="s-color-mode">Mode</label>
          <select id="s-color-mode">
            <option value="rainbow" selected>Rainbow</option>
            <option value="hue-range">Hue Range</option>
            <option value="solid">Solid</option>
          </select>
        </div>
        <div class="sp-row hue-range-row hidden">
          <label for="s-hue-start">Hue from</label>
          <input type="range" id="s-hue-start" min="0" max="360" step="1" value="0" />
          <input type="number" class="sp-val" id="s-hue-start-val" value="0" min="0" max="360" step="1" />
        </div>
        <div class="sp-row hue-range-row hidden">
          <label for="s-hue-end">Hue to</label>
          <input type="range" id="s-hue-end" min="0" max="360" step="1" value="360" />
          <input type="number" class="sp-val" id="s-hue-end-val" value="360" min="0" max="360" step="1" />
        </div>
        <div class="sp-row hsl-row">
          <label for="s-saturation">Saturation</label>
          <input type="range" id="s-saturation" min="0" max="100" step="1" value="80" />
          <input type="number" class="sp-val" id="s-saturation-val" value="80" min="0" max="100" step="1" />
        </div>
        <div class="sp-row hsl-row">
          <label for="s-lightness">Lightness</label>
          <input type="range" id="s-lightness" min="0" max="100" step="1" value="65" />
          <input type="number" class="sp-val" id="s-lightness-val" value="65" min="0" max="100" step="1" />
        </div>
        <div class="sp-row solid-row hidden">
          <label for="s-solid-color">Color</label>
          <input type="color" id="s-solid-color" value="#a78bfa" />
        </div>
      </div>

    </div>
  </aside>

  <!-- Analysis modal -->
  <div id="analysis-overlay" role="dialog" aria-labelledby="analysis-title" aria-modal="true">
    <div id="analysis-modal">
      <div class="am-header">
        <span id="analysis-title">Run Analysis</span>
        <button class="am-close" id="analysisClose" title="Close">&#10005;</button>
      </div>
      <div class="am-body">
        <div class="am-fields">
          <div class="am-field">
            <label for="a-start">Start multiplier</label>
            <input id="a-start" type="number" step="any" />
          </div>
          <div class="am-field">
            <label for="a-end">End multiplier</label>
            <input id="a-end" type="number" step="any" />
          </div>
          <div class="am-field">
            <label for="a-step">Multiplier step size</label>
            <input id="a-step" type="number" step="any" min="0.001" />
          </div>
          <div class="am-field">
            <label for="a-points">Number of points</label>
            <input id="a-points" type="number" step="1" min="2" />
          </div>
        </div>
        <div class="am-actions">
          <button class="am-run-btn" id="analysisRunBtn">Run</button>
          <span class="am-status" id="analysisStatus"></span>
        </div>
        <div class="am-results" id="analysisResults">
          <div class="am-chart-wrap" id="analysis-chart-wrap">
            <canvas id="analysis-chart"></canvas>
            <div id="analysis-chart-tip" class="am-chart-tip"></div>
          </div>
          <div class="am-chart-hint">Scroll to zoom · drag to pan · double-click to reset</div>
          <button class="am-dl-btn" id="analysisDownloadBtn">Download data (CSV)</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    const el = id => document.getElementById(id);

    const multSlider    = el('multSlider');
    const pointsSlider  = el('pointsSlider');
    const multNum       = el('multNum');
    const pointsNum     = el('pointsNum');
    const multLo        = el('multLo');
    const multHi        = el('multHi');
    const pointsLo      = el('pointsLo');
    const pointsHi      = el('pointsHi');
    const multStep      = el('multStep');
    const pointsStep    = el('pointsStep');
    const multPlayBtn   = el('multPlayBtn');
    const pointsPlayBtn = el('pointsPlayBtn');

    let mult = 2, points = 200;
    let multAnim = 2, pointsAnim = 200;
    let multPlaying = false, pointsPlaying = false;
    let lastTime = null, rafId = null;

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function num(el) { const v = parseFloat(el.value); return isNaN(v) ? 0 : v; }

    // ── sync helpers ──────────────────────────────────────────────

    function syncMult(v, redraw = true) {
      const lo = num(multLo), hi = num(multHi);
      mult = clamp(isNaN(parseFloat(v)) ? lo : parseFloat(v), lo, hi);
      multAnim = mult;
      multSlider.value = mult;
      multNum.value    = parseFloat(mult.toFixed(3));
      if (redraw) draw();
    }

    function syncPoints(v, redraw = true) {
      const lo = num(pointsLo);
      const requested = isNaN(parseFloat(v)) ? lo : Math.round(parseFloat(v));
      if (requested > num(pointsHi)) {
        pointsHi.value   = requested;
        pointsSlider.max = requested;
      }
      const hi = num(pointsHi);
      points = clamp(requested, lo, hi);
      pointsAnim = points;
      pointsSlider.value = points;
      pointsNum.value    = points;
      multHi.value       = points;
      multSlider.max     = points;
      if (mult > points) syncMult(points, false);
      if (redraw) draw();
    }

    function applyBounds(slider, loInput, hiInput, syncFn) {
      slider.min = num(loInput);
      slider.max = num(hiInput);
      syncFn(parseFloat(slider.value));
    }

    // ── slider / value input listeners ───────────────────────────

    multSlider.addEventListener('input',   () => syncMult(multSlider.value));
    multNum.addEventListener('change',     () => syncMult(multNum.value));
    pointsSlider.addEventListener('input', () => syncPoints(pointsSlider.value));
    pointsNum.addEventListener('change',   () => syncPoints(pointsNum.value));

    // ── bound input listeners ─────────────────────────────────────

    multLo.addEventListener('change',   () => applyBounds(multSlider,   multLo,   multHi,   syncMult));
    multHi.addEventListener('change',   () => applyBounds(multSlider,   multLo,   multHi,   syncMult));
    pointsLo.addEventListener('change', () => applyBounds(pointsSlider, pointsLo, pointsHi, syncPoints));
    pointsHi.addEventListener('change', () => applyBounds(pointsSlider, pointsLo, pointsHi, syncPoints));

    // ── arrow button listeners ────────────────────────────────────

    document.querySelectorAll('.step-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const dir = parseFloat(btn.dataset.dir);
        if (btn.dataset.target === 'mult') {
          syncMult(mult + dir * (parseFloat(multStep.value) || 0.1));
        } else {
          syncPoints(points + dir * (parseFloat(pointsStep.value) || 1));
        }
      });
    });

    // ── per-row play toggle ───────────────────────────────────────

    function toggleRowPlay(btn, flagSetter) {
      const active = btn.classList.toggle('active');
      btn.innerHTML = active ? '&#9646;&#9646;' : '&#9654;';
      flagSetter(active);
      const anyPlaying = multPlaying || pointsPlaying;
      if (anyPlaying && !rafId) {
        lastTime = null;
        rafId = requestAnimationFrame(animate);
      } else if (!anyPlaying && rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    multPlayBtn.addEventListener('click', () => {
      toggleRowPlay(multPlayBtn, v => { multPlaying = v; });
      if (!multPlaying && el('s-snap-pause').checked) {
        const step = parseFloat(multStep.value) || 1;
        const decimals = (step.toString().split('.')[1] || '').length;
        syncMult(parseFloat((Math.round(mult / step) * step).toFixed(decimals)));
      }
    });
    pointsPlayBtn.addEventListener('click', () => toggleRowPlay(pointsPlayBtn, v => { pointsPlaying = v; }));

    // ── animation loop ────────────────────────────────────────────

    function wrapAnim(val, lo, hi) {
      const range = hi - lo;
      if (range <= 0) return lo;
      while (val > hi) val = lo + (val - hi);
      while (val < lo) val = hi - (lo - val);
      return val;
    }

    function animate(ts) {
      if (!lastTime) lastTime = ts;
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;

      if (multPlaying) {
        const lo = num(multLo), hi = num(multHi);
        const spd = parseFloat(multStep.value) || 0.1;
        multAnim = wrapAnim(multAnim + spd * dt, lo, hi);
        mult = multAnim;
        multSlider.value = mult;
        multNum.value    = parseFloat(mult.toFixed(3));
      }

      if (pointsPlaying) {
        const lo = num(pointsLo), hi = num(pointsHi);
        const spd = parseFloat(pointsStep.value) || 5;
        pointsAnim = wrapAnim(pointsAnim + spd * dt, lo, hi);
        points = Math.round(pointsAnim);
        pointsSlider.value = points;
        pointsNum.value    = points;
      }

      draw();
      rafId = requestAnimationFrame(animate);
    }

    // ── canvas sizing ─────────────────────────────────────────────

    function sizeCanvas() {
      const wrap = el('canvas-wrap');
      const rect = wrap.getBoundingClientRect();
      const px   = Math.floor(Math.min(rect.width, rect.height) * devicePixelRatio);
      canvas.width  = px;
      canvas.height = px;
      const css = Math.floor(px / devicePixelRatio) + 'px';
      canvas.style.width  = css;
      canvas.style.height = css;
    }

    // ── Style config ──────────────────────────────────────────────

    const style = {
      bgColor:      '#0d0d0d',
      showRing:     true,
      ringColor:    '#2a2a2a',
      ringWidth:    1.5,
      showDots:     true,
      dotColor:     '#3a3a5a',
      dotScale:     1.0,
      lineWidthMax: 1.2,
      lineOpacity:  0.55,
      colorMode:    'rainbow',   // 'rainbow' | 'hue-range' | 'solid'
      hueStart:     0,
      hueEnd:       360,
      saturation:   80,
      lightness:    65,
      solidColor:   '#a78bfa',
    };

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ── draw ──────────────────────────────────────────────────────

    function draw() {
      const sz = canvas.width;
      if (!sz) return;
      const cx = sz / 2, cy = sz / 2, r = sz * 0.44;

      ctx.fillStyle = style.bgColor;
      ctx.fillRect(0, 0, sz, sz);

      if (style.showRing) {
        ctx.strokeStyle = style.ringColor;
        ctx.lineWidth   = style.ringWidth;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (points < 2) return;

      const dotR = Math.max(1.2, 4 - points / 80) * style.dotScale;
      if (style.showDots) {
        for (let i = 0; i < points; i++) {
          const a = (2 * Math.PI * i) / points - Math.PI / 2;
          ctx.fillStyle = style.dotColor;
          ctx.beginPath();
          ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), dotR, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.lineWidth = Math.max(0.3, style.lineWidthMax - points / 300);
      for (let i = 0; i < points; i++) {
        const j  = (i * mult) % points;
        const a1 = (2 * Math.PI * i) / points - Math.PI / 2;
        const a2 = (2 * Math.PI * j) / points - Math.PI / 2;
        let sc;
        if (style.colorMode === 'solid') {
          sc = hexToRgba(style.solidColor, style.lineOpacity);
        } else if (style.colorMode === 'hue-range') {
          const hue = style.hueStart + (i / points) * (style.hueEnd - style.hueStart);
          sc = `hsla(${hue},${style.saturation}%,${style.lightness}%,${style.lineOpacity})`;
        } else {
          sc = `hsla(${(i / points) * 360},${style.saturation}%,${style.lightness}%,${style.lineOpacity})`;
        }
        ctx.strokeStyle = sc;
        ctx.beginPath();
        ctx.moveTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1));
        ctx.lineTo(cx + r * Math.cos(a2), cy + r * Math.sin(a2));
        ctx.stroke();
      }
    }

    window.addEventListener('resize', () => { sizeCanvas(); draw(); });

    // ── keep slider step in sync with step input ──────────────────
    function applyStep(slider, stepInput) {
      const s = parseFloat(stepInput.value);
      if (s > 0) slider.step = s;
    }
    multStep.addEventListener('change',   () => applyStep(multSlider,   multStep));
    pointsStep.addEventListener('change', () => applyStep(pointsSlider, pointsStep));
    // init
    applyStep(multSlider,   multStep);
    applyStep(pointsSlider, pointsStep);
    syncPoints(200, false);

    sizeCanvas();
    draw();

    // ── Focus tooltips ────────────────────────────────────────────
    (function () {
      const tip = document.getElementById('tip');

      function show(el) {
        const text = el.dataset.tip;
        if (!text) return;
        tip.textContent = text;
        tip.classList.remove('tip-below');
        tip.style.left = '0px';
        tip.style.top  = '-9999px';
        tip.classList.add('visible');

        requestAnimationFrame(() => {
          const rect  = el.getBoundingClientRect();
          const tipW  = tip.offsetWidth;
          const tipH  = tip.offsetHeight;
          const gap   = 12;          // px between input edge and tooltip
          const vw    = window.innerWidth;

          let left  = rect.left + rect.width / 2 - tipW / 2;
          let top   = rect.top - tipH - gap;
          let below = false;

          if (top < 6) { top = rect.bottom + gap; below = true; }
          const cl = Math.max(6, Math.min(left, vw - tipW - 6));

          // keep the arrow pointing at the input's centre even when clamped
          tip.style.setProperty('--tip-arrow', (rect.left + rect.width / 2 - cl) + 'px');
          tip.style.left = cl + 'px';
          tip.style.top  = top + 'px';
          if (below) tip.classList.add('tip-below');
        });
      }

      function hide() { tip.classList.remove('visible', 'tip-below'); }

      document.querySelectorAll('[data-tip]').forEach(el => {
        el.addEventListener('focus', () => show(el));
        el.addEventListener('blur',  hide);
      });
    })();

    // ── Settings panel ────────────────────────────────────────────

    const settingsPanel   = el('settings-panel');
    const settingsOverlay = el('settings-overlay');

    function openSettings()  { settingsPanel.classList.add('open');    settingsOverlay.classList.add('open'); }
    function closeSettings() { settingsPanel.classList.remove('open'); settingsOverlay.classList.remove('open'); }

    el('settingsBtn').addEventListener('click', openSettings);
    el('settingsClose').addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', closeSettings);

    function updateColorModeUI() {
      const mode = style.colorMode;
      document.querySelectorAll('.hue-range-row').forEach(r => r.classList.toggle('hidden', mode !== 'hue-range'));
      document.querySelectorAll('.hsl-row').forEach(r => r.classList.toggle('hidden', mode === 'solid'));
      document.querySelectorAll('.solid-row').forEach(r => r.classList.toggle('hidden', mode !== 'solid'));
    }

    function bindRange(id, valId, prop, suffix, decimals) {
      const inp = el(id), valEl = el(valId);
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        style[prop] = v;
        valEl.value = v.toFixed(decimals);
        draw();
      });
      valEl.addEventListener('change', () => {
        const raw = parseFloat(valEl.value);
        const v = isNaN(raw) ? parseFloat(inp.value)
                             : Math.min(parseFloat(inp.max), Math.max(parseFloat(inp.min), raw));
        style[prop] = v;
        inp.value = v;
        valEl.value = v.toFixed(decimals);
        draw();
      });
    }
    function bindColor(id, prop) {
      el(id).addEventListener('input', () => { style[prop] = el(id).value; draw(); });
    }
    function bindCheck(id, prop) {
      el(id).addEventListener('change', () => { style[prop] = el(id).checked; draw(); });
    }

    // Background: also keep body bg in sync so corners under border-radius match
    el('s-bg-color').addEventListener('input', () => {
      style.bgColor = el('s-bg-color').value;
      document.body.style.background = style.bgColor;
      draw();
    });

    bindCheck('s-show-ring',    'showRing');
    bindColor('s-ring-color',   'ringColor');
    bindRange('s-ring-width',   's-ring-width-val',   'ringWidth',    '',  1);
    bindCheck('s-show-dots',    'showDots');
    bindColor('s-dot-color',    'dotColor');
    bindRange('s-dot-scale',    's-dot-scale-val',    'dotScale',     '',  2);
    bindRange('s-line-width',   's-line-width-val',   'lineWidthMax', '',  1);
    bindRange('s-line-opacity', 's-line-opacity-val', 'lineOpacity',  '',  2);
    bindRange('s-hue-start',    's-hue-start-val',    'hueStart',     '°', 0);
    bindRange('s-hue-end',      's-hue-end-val',      'hueEnd',       '°', 0);
    bindRange('s-saturation',   's-saturation-val',   'saturation',   '%', 0);
    bindRange('s-lightness',    's-lightness-val',    'lightness',    '%', 0);
    bindColor('s-solid-color',  'solidColor');

    el('s-color-mode').addEventListener('change', () => {
      style.colorMode = el('s-color-mode').value;
      updateColorModeUI();
      draw();
    });

    // ── Path length analysis ──────────────────────────────────────

    function chordLength(i, j, n) {
      const a1 = (2 * Math.PI * i) / n;
      const a2 = (2 * Math.PI * j) / n;
      let diff = Math.abs(a2 - a1);
      if (diff > Math.PI) diff = 2 * Math.PI - diff;
      return 2 * Math.sin(diff / 2);
    }

    function totalPathLength(multVal, n) {
      if (n < 2) return 0;
      let total = 0;
      for (let i = 0; i < n; i++) {
        const j = (i * multVal) % n;
        total += chordLength(i, j, n);
      }
      return total;
    }

    function buildMultiplierRange(start, end, step) {
      const decimals = Math.max(
        (step.toString().split('.')[1] || '').length,
        (start.toString().split('.')[1] || '').length,
        (end.toString().split('.')[1] || '').length
      );
      const range = [];
      const maxSteps = 10000;
      for (let i = 0, m = start; m <= end + step * 0.0001 && i < maxSteps; i++, m += step) {
        range.push(parseFloat(m.toFixed(decimals)));
      }
      return range;
    }

    let analysisData = [];
    const chart = {
      view: null,
      full: null,
      layout: null,
      hover: -1,
      panning: false,
      panStart: null,
    };

    const analysisOverlay = el('analysis-overlay');
    const analysisChart   = el('analysis-chart');
    const analysisChartTip = el('analysis-chart-tip');

    function chartFmt(v) {
      if (Math.abs(v) >= 1000) return v.toFixed(0);
      if (Math.abs(v) >= 10) return v.toFixed(1);
      return v.toFixed(2);
    }

    function chartBounds(data) {
      const xs = data.map(d => d.multiplier);
      const ys = data.map(d => d.pathLength);
      let xMin = Math.min(...xs), xMax = Math.max(...xs);
      let yMin = Math.min(...ys), yMax = Math.max(...ys);
      const xPad = (xMax - xMin || 1) * 0.05;
      const yPad = (yMax - yMin || yMax * 0.02 || 1) * 0.12;
      if (yMax === yMin) { yMin -= 1; yMax += 1; }
      return { xMin: xMin - xPad, xMax: xMax + xPad, yMin: yMin - yPad, yMax: yMax + yPad };
    }

    function resetChartView() {
      if (!analysisData.length) return;
      const b = chartBounds(analysisData);
      chart.view = { ...b };
      chart.full = { ...b };
    }

    function clampChartView() {
      if (!chart.full || !chart.view) return;
      const minXSpan = (chart.full.xMax - chart.full.xMin) * 0.02;
      const minYSpan = (chart.full.yMax - chart.full.yMin) * 0.02;
      let xSpan = chart.view.xMax - chart.view.xMin;
      let ySpan = chart.view.yMax - chart.view.yMin;
      if (xSpan < minXSpan) {
        const cx = (chart.view.xMin + chart.view.xMax) / 2;
        chart.view.xMin = cx - minXSpan / 2;
        chart.view.xMax = cx + minXSpan / 2;
        xSpan = minXSpan;
      }
      if (ySpan < minYSpan) {
        const cy = (chart.view.yMin + chart.view.yMax) / 2;
        chart.view.yMin = cy - minYSpan / 2;
        chart.view.yMax = cy + minYSpan / 2;
        ySpan = minYSpan;
      }
      if (chart.view.xMin < chart.full.xMin) {
        chart.view.xMax += chart.full.xMin - chart.view.xMin;
        chart.view.xMin = chart.full.xMin;
      }
      if (chart.view.xMax > chart.full.xMax) {
        chart.view.xMin -= chart.view.xMax - chart.full.xMax;
        chart.view.xMax = chart.full.xMax;
      }
      if (chart.view.yMin < chart.full.yMin) {
        chart.view.yMax += chart.full.yMin - chart.view.yMin;
        chart.view.yMin = chart.full.yMin;
      }
      if (chart.view.yMax > chart.full.yMax) {
        chart.view.yMin -= chart.view.yMax - chart.full.yMax;
        chart.view.yMax = chart.full.yMax;
      }
    }

    function fillAnalysisDefaults() {
      el('a-start').value  = num(multLo);
      el('a-end').value    = num(multHi);
      el('a-step').value   = parseFloat(multStep.value) || 1;
      el('a-points').value = points;
    }

    function openAnalysis() {
      fillAnalysisDefaults();
      el('analysisStatus').textContent = '';
      el('analysisResults').classList.remove('visible');
      chart.hover = -1;
      analysisChartTip.classList.remove('visible');
      analysisOverlay.classList.add('open');
    }
    function closeAnalysis() { analysisOverlay.classList.remove('open'); }

    el('analysisBtn').addEventListener('click', openAnalysis);
    el('analysisClose').addEventListener('click', closeAnalysis);
    analysisOverlay.addEventListener('click', e => { if (e.target === analysisOverlay) closeAnalysis(); });

    function drawAnalysisChart() {
      const data = analysisData;
      const wrap = el('analysis-chart-wrap');
      const dpr  = devicePixelRatio || 1;
      const cssH = 340;
      const w    = Math.floor(wrap.clientWidth * dpr);
      const h    = Math.floor(cssH * dpr);
      analysisChart.width  = w;
      analysisChart.height = h;

      const g = analysisChart.getContext('2d');
      g.fillStyle = '#0d0d0d';
      g.fillRect(0, 0, w, h);

      if (!data.length || !chart.view) return;

      const { xMin, xMax, yMin, yMax } = chart.view;
      const xSpan = xMax - xMin || 1;
      const ySpan = yMax - yMin || 1;
      const fontSize = 11 * dpr;

      g.font = `${fontSize}px 'Segoe UI', system-ui, sans-serif`;
      const yLabelW = Math.max(
        g.measureText(chartFmt(yMin)).width,
        g.measureText(chartFmt(yMax)).width
      );
      const xLabelW = Math.max(
        g.measureText(chartFmt(xMin)).width,
        g.measureText(chartFmt(xMax)).width
      );
      const dotR = 4 * dpr;

      const pad = {
        l: Math.ceil(yLabelW + 52 * dpr),
        r: Math.ceil(xLabelW / 2 + 24 * dpr),
        t: Math.ceil(fontSize + 20 * dpr),
        b: Math.ceil(fontSize + 40 * dpr),
      };
      const plotX = pad.l;
      const plotY = pad.t;
      const plotW = w - pad.l - pad.r;
      const plotH = h - pad.t - pad.b;

      const toX = v => plotX + ((v - xMin) / xSpan) * plotW;
      const toY = v => plotY + plotH - ((v - yMin) / ySpan) * plotH;

      const screenPts = data.map((d, i) => ({
        i, x: toX(d.multiplier), y: toY(d.pathLength),
      }));
      chart.layout = {
        dpr, w, h, pad, plotX, plotY, plotW, plotH, screenPts, xMin, xMax, yMin, yMax,
      };

      g.strokeStyle = '#555';
      g.lineWidth = dpr;
      g.strokeRect(plotX + dpr / 2, plotY + dpr / 2, plotW - dpr, plotH - dpr);

      g.save();
      g.beginPath();
      g.rect(plotX, plotY, plotW, plotH);
      g.clip();

      g.strokeStyle = '#a78bfa';
      g.lineWidth = 1.5 * dpr;
      g.lineJoin = 'round';
      g.lineCap = 'round';
      g.beginPath();
      screenPts.forEach((p, i) => {
        if (i === 0) g.moveTo(p.x, p.y);
        else g.lineTo(p.x, p.y);
      });
      g.stroke();

      screenPts.forEach(p => {
        const active = p.i === chart.hover;
        const r = active ? dotR + dpr : dotR;
        g.fillStyle = active ? '#fff' : '#c4b5fd';
        g.beginPath();
        g.arc(p.x, p.y, r, 0, Math.PI * 2);
        g.fill();
        if (active) {
          g.strokeStyle = '#a78bfa';
          g.lineWidth = 1.5 * dpr;
          g.stroke();
        }
      });
      g.restore();

      g.fillStyle = '#888';
      g.textAlign = 'center';
      g.textBaseline = 'alphabetic';
      g.fillText('Multiplier', plotX + plotW / 2, h - 12 * dpr);

      g.save();
      g.translate(Math.max(28 * dpr, pad.l * 0.32), plotY + plotH / 2);
      g.rotate(-Math.PI / 2);
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText('Total path length', 0, 0);
      g.restore();

      g.fillStyle = '#888';
      g.textBaseline = 'middle';
      g.textAlign = 'right';
      g.fillText(chartFmt(yMax), plotX - 10 * dpr, plotY);
      g.fillText(chartFmt(yMin), plotX - 10 * dpr, plotY + plotH);
      g.textAlign = 'center';
      g.fillText(chartFmt(xMin), plotX, plotY + plotH + 18 * dpr);
      g.fillText(chartFmt(xMax), plotX + plotW, plotY + plotH + 18 * dpr);
    }

    function chartMousePos(e) {
      const rect = analysisChart.getBoundingClientRect();
      const dpr = chart.layout?.dpr || devicePixelRatio || 1;
      return {
        x: (e.clientX - rect.left) * dpr,
        y: (e.clientY - rect.top) * dpr,
        cssX: e.clientX - rect.left,
        cssY: e.clientY - rect.top,
      };
    }

    function findNearestPoint(mx, my) {
      if (!chart.layout) return -1;
      const hit = 14 * (chart.layout.dpr || 1);
      let best = -1, bestDist = hit;
      chart.layout.screenPts.forEach(p => {
        const d = Math.hypot(p.x - mx, p.y - my);
        if (d < bestDist) { bestDist = d; best = p.i; }
      });
      return best;
    }

    function updateChartHover(e) {
      if (!analysisData.length || chart.panning) {
        analysisChartTip.classList.remove('visible');
        return;
      }
      const { x, y, cssX, cssY } = chartMousePos(e);
      const idx = findNearestPoint(x, y);
      if (idx !== chart.hover) {
        chart.hover = idx;
        drawAnalysisChart();
      }
      if (idx >= 0) {
        const d = analysisData[idx];
        analysisChartTip.textContent = `mult: ${d.multiplier}  ·  path: ${d.pathLength.toFixed(4)}`;
        analysisChartTip.style.left = cssX + 'px';
        analysisChartTip.style.top  = cssY + 'px';
        analysisChartTip.classList.add('visible');
      } else {
        analysisChartTip.classList.remove('visible');
      }
    }

    function zoomChartAt(cssX, cssY, factor) {
      if (!chart.layout || !chart.view) return;
      const { plotX, plotY, plotW, plotH, dpr } = chart.layout;
      const mx = cssX * dpr;
      const my = cssY * dpr;
      if (mx < plotX || mx > plotX + plotW || my < plotY || my > plotY + plotH) return;

      const relX = (mx - plotX) / plotW;
      const relY = (my - plotY) / plotH;
      const { xMin, xMax, yMin, yMax } = chart.view;
      const xSpan = xMax - xMin;
      const ySpan = yMax - yMin;
      const anchorX = xMin + relX * xSpan;
      const anchorY = yMax - relY * ySpan;
      const newXSpan = xSpan * factor;
      const newYSpan = ySpan * factor;

      chart.view.xMin = anchorX - relX * newXSpan;
      chart.view.xMax = anchorX + (1 - relX) * newXSpan;
      chart.view.yMin = anchorY - (1 - relY) * newYSpan;
      chart.view.yMax = anchorY + relY * newYSpan;
      clampChartView();
      drawAnalysisChart();
      updateChartHover({ clientX: analysisChart.getBoundingClientRect().left + cssX,
                         clientY: analysisChart.getBoundingClientRect().top + cssY });
    }

    analysisChart.addEventListener('wheel', e => {
      if (!analysisData.length) return;
      e.preventDefault();
      const rect = analysisChart.getBoundingClientRect();
      const factor = e.deltaY < 0 ? 0.85 : 1.18;
      zoomChartAt(e.clientX - rect.left, e.clientY - rect.top, factor);
    }, { passive: false });

    analysisChart.addEventListener('mousedown', e => {
      if (!chart.layout || e.button !== 0) return;
      chart.panning = true;
      chart.panStart = { ...chartMousePos(e), view: { ...chart.view } };
      analysisChart.style.cursor = 'grabbing';
      analysisChartTip.classList.remove('visible');
    });

    window.addEventListener('mousemove', e => {
      if (chart.panning && chart.panStart && chart.layout) {
        const pos = chartMousePos(e);
        const dx = pos.x - chart.panStart.x;
        const dy = pos.y - chart.panStart.y;
        const { plotW, plotH } = chart.layout;
        const v = chart.panStart.view;
        const xShift = -(dx / plotW) * (v.xMax - v.xMin);
        const yShift = (dy / plotH) * (v.yMax - v.yMin);
        chart.view.xMin = v.xMin + xShift;
        chart.view.xMax = v.xMax + xShift;
        chart.view.yMin = v.yMin + yShift;
        chart.view.yMax = v.yMax + yShift;
        clampChartView();
        drawAnalysisChart();
        return;
      }
      if (analysisOverlay.classList.contains('open') && analysisData.length) {
        updateChartHover(e);
      }
    });

    window.addEventListener('mouseup', () => {
      if (!chart.panning) return;
      chart.panning = false;
      chart.panStart = null;
      analysisChart.style.cursor = 'crosshair';
    });

    analysisChart.addEventListener('dblclick', () => {
      resetChartView();
      chart.hover = -1;
      analysisChartTip.classList.remove('visible');
      drawAnalysisChart();
    });

    analysisChart.addEventListener('mouseleave', () => {
      if (chart.panning) return;
      chart.hover = -1;
      analysisChartTip.classList.remove('visible');
      drawAnalysisChart();
    });

    function downloadAnalysisCsv() {
      if (!analysisData.length) return;
      const lines = ['multiplier,path_length', ...analysisData.map(d =>
        `${d.multiplier},${d.pathLength.toFixed(6)}`
      )];
      const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const pts = analysisData[0] ? el('a-points').value : points;
      a.download = `path_length_analysis_${pts}_points.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    el('analysisRunBtn').addEventListener('click', () => {
      const start  = parseFloat(el('a-start').value);
      const end    = parseFloat(el('a-end').value);
      const step   = parseFloat(el('a-step').value);
      const nPts   = Math.round(parseFloat(el('a-points').value));
      const status = el('analysisStatus');
      const runBtn = el('analysisRunBtn');

      if (isNaN(start) || isNaN(end) || isNaN(step) || step <= 0) {
        status.textContent = 'Invalid multiplier range or step.';
        return;
      }
      if (end < start) {
        status.textContent = 'End multiplier must be ≥ start.';
        return;
      }
      if (isNaN(nPts) || nPts < 2) {
        status.textContent = 'Points must be at least 2.';
        return;
      }

      const multipliers = buildMultiplierRange(start, end, step);
      if (!multipliers.length) {
        status.textContent = 'No multipliers in range.';
        return;
      }
      if (multipliers.length > 10000) {
        status.textContent = 'Range too large (max 10,000 steps).';
        return;
      }

      runBtn.disabled = true;
      status.textContent = `Computing ${multipliers.length} values…`;

      requestAnimationFrame(() => {
        analysisData = multipliers.map(m => ({
          multiplier: m,
          pathLength: totalPathLength(m, nPts),
        }));

        resetChartView();
        chart.hover = -1;
        el('analysisResults').classList.add('visible');
        requestAnimationFrame(() => drawAnalysisChart());
        status.textContent = `${analysisData.length} values computed.`;
        runBtn.disabled = false;
      });
    });

    el('analysisDownloadBtn').addEventListener('click', downloadAnalysisCsv);

    // ── Download ──────────────────────────────────────────────────

    el('downloadBtn').addEventListener('click', () => {
      const m = parseFloat(mult.toFixed(3));
      const filename = `${m}_mult_${points}_points.png`;
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = filename;
      a.click();
    });
  </script>
</body>
</html>
